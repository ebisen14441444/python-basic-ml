site_name: Python基礎講習会
site_description: 機械学習講習会へ進む前にPythonの基本を確認するための教材
docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:8004
use_directory_urls: true
strict: true

theme:
  name: readthedocs
  locale: ja

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/section-cards.js
  - javascripts/python-runner.js
  - javascripts/copy-code.js

nav:
  - はじめに: index.md
  - 00. 環境準備: 00_setup.md
  - 01. Pythonの基本: 01_python_basics.md
  - 02. データ構造: 02_data_structures.md
  - 03. 条件分岐と繰り返し: 03_control_flow.md
  - 04. 関数: 04_functions.md
  - 05. オブジェクトとドット記法: 05_objects.md
  - 06. クラス: 06_classes.md
  - 07. よく見るPythonの書き方: 07_python_extras.md
  - 08. NumPy：配列を作成する: 08_numpy_basics.md
  - 09. NumPyの操作: 09_numpy_multidim.md
  - 10. NumPyの取り出しとaxis: 10_numpy_indexing.md
  - 11. NumPyの応用：実画像を操作する: 11_numpy_calculation.md
  - 12. Polarsの基本: 12_polars_basics.md
  - 13. Polarsの列操作と条件抽出: 13_polars_select_filter.md
  - 14. Polarsの複雑な操作: 14_polars_multiple_select.md
  - 15. Polarsで時系列データを扱う: 15_polars_timeseries.md

markdown_extensions:
  - fenced_code
  - tables
  - toc:
      permalink: true
