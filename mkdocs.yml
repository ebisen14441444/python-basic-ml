site_name: Python基礎講習会
site_description: 機械学習講習会へ進む前にPythonの基本を確認するための教材
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: readthedocs
  locale: ja

extra_css:
  - stylesheets/extra.css

nav:
  - はじめに: index.md
  - 00. 環境準備: 00_setup.md
  - 01. Pythonの基本: 01_python_basics.md
  - 02. データ構造: 02_data_structures.md
  - 03. NumPyとPandas: 03_numpy_pandas.md
  - 04. 機械学習講習会への接続: 04_bridge_to_ml.md

markdown_extensions:
  - fenced_code
  - tables
  - toc:
      permalink: true
